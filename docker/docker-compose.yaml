version: '3.9'
services:
  xinference:
    image: xprobe/xinference:v0.12.3
    restart: always
    command: xinference-local -H 0.0.0.0
    network_mode: "host"
    volumes:
      - ~/xinference:/root/.xinference
    # GPU സെക്ഷൻ ഒഴിവാക്കി, പകരം സാധാരണ റിസോഴ്സ് സെറ്റിംഗ്‌സ് ഉപയോഗിക്കുന്നു

  chatchat:
    image: chatimage/chatchat:0.3.1.3-93e2c87-20240829
    restart: always
    network_mode: "host"
